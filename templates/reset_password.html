<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atur Ulang Password - Cicipin</title>
    <link rel="icon" type="image/jpg" href="{{ url_for('static', filename='favicon.jpg') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <header>
        <div class="header-inner">
            <a href="{{ url_for('index') }}" class="logo">
                <div class="logo-mark">
                    <img src="{{ url_for('static', filename='favicon.jpg') }}" alt="Cicipin" />
                </div>
                <div class="logo-text">Cicipin</div>
            </a>

            <nav class="nav-links">
                <a href="{{ url_for('login') }}" class="nav-link">Masuk</a>
                <a href="{{ url_for('register') }}" class="nav-link">Daftar</a>
            </nav>
        </div>
    </header>

    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    {% for category, message in messages %}
    <div class="popup {{ category }} show" id="popupMessage">
        <p id="popupText">{{ message }}</p>
    </div>
    {% endfor %}
    {% endif %}
    {% endwith %}

    <div class="auth-container">
        <div class="auth-card">
            <h1>Setel Ulang Password</h1>
            <p class="auth-tagline">Buat password baru untuk akun Anda.</p>

            <form action="{{ url_for('reset_password', token=token) }}" method="POST">
                <div class="form-group">
                    <label for="password">Password Baru</label>
                    <input type="password" id="password" name="password" placeholder="Buat password kuat" required>
                </div>
                <div class="form-group">
                    <label for="confirm_password">Konfirmasi Password</label>
                    <input type="password" id="confirm_password" name="confirm_password" placeholder="Ketik ulang password" required>
                </div>
                <button type="submit" class="auth-submit-btn">Simpan Password Baru</button>
            </form>

            <p class="auth-link"><a href="{{ url_for('login') }}">Kembali ke login</a></p>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>

</html>

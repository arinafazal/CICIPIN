<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar - Cicipin</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body style="background-color: var(--cream-bg); min-height: 100vh; display: flex; align-items: center; justify-content: center;">
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="popup {{ category }} show" id="popupMessage">
                    <p id="popupText">{{ message }}</p>
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <div class="auth-container">
        <div class="auth-form-box register">
            <h1><span style="font-size: 28px;">🐾</span> Daftar</h1>
            <p class="auth-tagline">Bergabunglah dengan komunitas kucing pecinta kuliner!</p>

            <form action="{{ url_for('register') }}" method="POST">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="kucing123" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="auth-submit-btn register-btn">Daftar Sekarang</button>
            </form>

            <div class="auth-link">
                Sudah punya akun? <a href="{{ url_for('login') }}">Masuk</a>
            </div>

            <div class="decorative-icons">🐱 😸 😻</div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
    <script>
        const popup = document.getElementById('popupMessage');
        if (popup) {
            setTimeout(() => {
                popup.classList.remove('show');
            }, 3000);
        }
    </script>
</body>
</html>
